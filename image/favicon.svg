<!--
  Compact 32×32 favicon variant — simplified silhouette so it stays
  legible inside a browser tab. Drops the pulse line; keeps the four
  iconic ascending bars on the gradient square.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Dashboards Rich Filters favicon">
  <defs>
    <linearGradient id="f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0052CC"/>
      <stop offset="100%" stop-color="#6554C0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" ry="7" fill="url(#f)"/>
  <rect x="6"  y="20" width="4" height="6"  rx="1" fill="#00B8D9"/>
  <rect x="12" y="16" width="4" height="10" rx="1" fill="#36B37E"/>
  <rect x="18" y="12" width="4" height="14" rx="1" fill="#FFAB00"/>
  <rect x="24" y="8"  width="4" height="18" rx="1" fill="#FF5630"/>
  <line x1="5" y1="26.5" x2="29" y2="26.5" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1" stroke-linecap="round"/>
</svg>

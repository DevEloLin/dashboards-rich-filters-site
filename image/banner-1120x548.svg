<!--
  Atlassian Marketplace app banner (1120×548) shown in UPM browser.
  Layout: left half = brand mark + name + tagline; right half = stylized
  dashboard preview composed from gradient cards (no real screenshot data,
  keeping it brand-safe and crisp at any DPI).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 548" width="1120" height="548" role="img" aria-label="Dashboards Rich Filters Marketplace banner">
  <defs>
    <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0052CC"/>
      <stop offset="50%" stop-color="#3D5AC9"/>
      <stop offset="100%" stop-color="#6554C0"/>
    </linearGradient>
    <linearGradient id="b-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b-mark-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1120" height="548" fill="url(#b-bg)"/>
  <!-- Decorative blurred orb -->
  <circle cx="980" cy="120" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="500" r="180" fill="#ffffff" opacity="0.05"/>

  <!-- ============ LEFT: brand mark + text ============ -->
  <!-- Mark chiclet -->
  <g transform="translate(64, 120)">
    <rect width="120" height="120" rx="26" fill="url(#b-mark-bg)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- mini pulse + bars inside the chiclet -->
    <g transform="translate(60,60) scale(0.42) translate(-128,-128)">
      <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <polyline points="40,82 80,82 96,56 112,108 128,38 144,82 176,82 200,68 216,82"/>
      </g>
      <circle cx="216" cy="82" r="6" fill="#ffffff"/>
      <rect x="58"  y="172" width="22" height="44" rx="5" fill="#00B8D9"/>
      <rect x="92"  y="156" width="22" height="60" rx="5" fill="#36B37E"/>
      <rect x="126" y="138" width="22" height="78" rx="5" fill="#FFAB00"/>
      <rect x="160" y="118" width="22" height="98" rx="5" fill="#FF5630"/>
      <line x1="48" y1="222" x2="208" y2="222" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- App name -->
  <text x="220" y="172" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">Dashboards Rich</text>
  <text x="220" y="216" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="42" font-weight="700" letter-spacing="-0.5">Filters</text>
  <!-- Sub-tagline -->
  <text x="220" y="252" fill="#ffffff" opacity="0.92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="18" font-weight="400">Premium executive dashboard for Jira Cloud</text>
  <!-- Highlights -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" fill="#ffffff" opacity="0.95">
    <text x="64" y="335">✦  Smart multi-select filters</text>
    <text x="64" y="365">✦  Real-time Health Score (0–100)</text>
    <text x="64" y="395">✦  PMO · QA · Burndown · Ishikawa</text>
  </g>
  <!-- Vendor + free trial pill -->
  <g transform="translate(64, 430)">
    <rect width="220" height="42" rx="21" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
    <text x="20" y="27" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="600">🎁  30-day free trial</text>
  </g>
  <text x="64" y="510" fill="#ffffff" opacity="0.7" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13">by elolin · Built on Atlassian Forge</text>

  <!-- ============ RIGHT: stylized dashboard preview ============ -->
  <g transform="translate(660, 80)">
    <!-- Card frame -->
    <rect x="0" y="0" width="396" height="388" rx="16" fill="url(#b-card)" stroke="rgba(255,255,255,0.30)" stroke-width="1.2"/>

    <!-- KPI tiles -->
    <g>
      <rect x="20"  y="20" width="82" height="72" rx="8" fill="rgba(255,255,255,0.14)"/>
      <text x="32"  y="46" fill="#ffffff" opacity="0.7" font-family="-apple-system" font-size="11">Total</text>
      <text x="32"  y="78" fill="#ffffff" font-family="-apple-system" font-size="22" font-weight="700">1,248</text>

      <rect x="114" y="20" width="82" height="72" rx="8" fill="rgba(54,179,126,0.30)"/>
      <text x="126" y="46" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="11">Done</text>
      <text x="126" y="78" fill="#ffffff" font-family="-apple-system" font-size="22" font-weight="700">812</text>

      <rect x="208" y="20" width="82" height="72" rx="8" fill="rgba(255,171,0,0.30)"/>
      <text x="220" y="46" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="11">In progress</text>
      <text x="220" y="78" fill="#ffffff" font-family="-apple-system" font-size="22" font-weight="700">284</text>

      <rect x="302" y="20" width="74" height="72" rx="8" fill="rgba(255,86,48,0.30)"/>
      <text x="314" y="46" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="11">Overdue</text>
      <text x="314" y="78" fill="#ffffff" font-family="-apple-system" font-size="22" font-weight="700">37</text>
    </g>

    <!-- Trend chart -->
    <g transform="translate(20, 120)">
      <rect x="0" y="0" width="356" height="160" rx="8" fill="rgba(255,255,255,0.08)"/>
      <text x="14" y="22" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="12" font-weight="600">Issue Trends · last 30 days</text>
      <!-- Created area -->
      <path d="M14,140 L36,120 L64,128 L92,108 L120,118 L148,90 L176,98 L204,72 L232,82 L260,60 L288,68 L316,50 L342,58 L346,40 L346,150 L14,150 Z" fill="rgba(0,184,217,0.4)" stroke="#00B8D9" stroke-width="2"/>
      <!-- Resolved area -->
      <path d="M14,148 L36,142 L64,138 L92,128 L120,124 L148,118 L176,110 L204,104 L232,96 L260,90 L288,82 L316,74 L342,68 L346,62 L346,150 L14,150 Z" fill="rgba(54,179,126,0.45)" stroke="#36B37E" stroke-width="2"/>
    </g>

    <!-- Health Score gauge -->
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="170" height="76" rx="8" fill="rgba(255,255,255,0.10)"/>
      <text x="14" y="22" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="11" font-weight="600">Health Score</text>
      <text x="14" y="60" fill="#ffffff" font-family="-apple-system" font-size="32" font-weight="700">82</text>
      <text x="56" y="60" fill="#36B37E" font-family="-apple-system" font-size="14" font-weight="600">Good</text>
      <circle cx="138" cy="38" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
      <circle cx="138" cy="38" r="22" fill="none" stroke="#36B37E" stroke-width="6" stroke-linecap="round" stroke-dasharray="113 138" transform="rotate(-90 138 38)"/>
    </g>

    <!-- Bars mini -->
    <g transform="translate(200, 300)">
      <rect x="0" y="0" width="176" height="76" rx="8" fill="rgba(255,255,255,0.10)"/>
      <text x="14" y="22" fill="#ffffff" opacity="0.85" font-family="-apple-system" font-size="11" font-weight="600">Workload by Assignee</text>
      <rect x="14" y="34" width="36" height="32" rx="3" fill="#00B8D9"/>
      <rect x="56" y="42" width="36" height="24" rx="3" fill="#36B37E"/>
      <rect x="98" y="50" width="36" height="16" rx="3" fill="#FFAB00"/>
      <rect x="140" y="56" width="22" height="10" rx="3" fill="#FF5630"/>
    </g>
  </g>
</svg>

<!--
  Atlassian Marketplace partner logo (144×144, transparent background).
  Marketplace REQUIRES the partner logo to have a transparent background
  so it can sit on the Marketplace's own light surfaces. This variant
  drops the gradient background and presents the brand mark directly.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="elolin partner logo">
  <defs>
    <linearGradient id="p-bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0091B7"/>
      <stop offset="100%" stop-color="#00B8D9"/>
    </linearGradient>
    <linearGradient id="p-bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1F8C5F"/>
      <stop offset="100%" stop-color="#36B37E"/>
    </linearGradient>
    <linearGradient id="p-bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#CC8800"/>
      <stop offset="100%" stop-color="#FFAB00"/>
    </linearGradient>
    <linearGradient id="p-bar4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#CC4423"/>
      <stop offset="100%" stop-color="#FF5630"/>
    </linearGradient>
  </defs>

  <!-- Pulse line in brand blue -->
  <g stroke="#0052CC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="40,82 80,82 96,56 112,108 128,38 144,82 176,82 200,68 216,82"/>
  </g>
  <circle cx="216" cy="82" r="7" fill="#0052CC"/>

  <!-- Bars -->
  <rect x="58"  y="172" width="22" height="44" rx="5" fill="url(#p-bar1)"/>
  <rect x="92"  y="156" width="22" height="60" rx="5" fill="url(#p-bar2)"/>
  <rect x="126" y="138" width="22" height="78" rx="5" fill="url(#p-bar3)"/>
  <rect x="160" y="118" width="22" height="98" rx="5" fill="url(#p-bar4)"/>

  <!-- Trend arrow -->
  <g stroke="#172B4D" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="69,172 103,156 137,138 171,118"/>
    <polygon points="171,118 158,113 165,128" fill="#172B4D" stroke="none"/>
  </g>

  <!-- Baseline -->
  <line x1="48" y1="222" x2="208" y2="222" stroke="#172B4D" stroke-opacity="0.5" stroke-width="2.5" stroke-linecap="round"/>
</svg>
